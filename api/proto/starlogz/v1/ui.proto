syntax = "proto3";

package starlogz.v1;

import "google/protobuf/timestamp.proto";

service UIService {
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc GetProjectDashboard(GetProjectDashboardRequest) returns (GetProjectDashboardResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc ListInsights(ListInsightsRequest) returns (ListInsightsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc SearchInsights(SearchInsightsRequest) returns (SearchInsightsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc GetInsight(GetInsightRequest) returns (GetInsightResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc ListInsightHistory(ListInsightHistoryRequest) returns (ListInsightHistoryResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc ListTags(ListTagsRequest) returns (ListTagsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

message GetSessionRequest {}

message GetSessionResponse {
  string user_id = 1;
  string login = 2;
  string email = 3;
  reserved 4;
  string display_name = 5;
  string avatar_url = 6;
  string profile_url = 7;
}

message ListProjectsRequest {}

message Project {
  string id = 1;
  string slug = 2;
  string name = 3;
  google.protobuf.Timestamp created_at = 4;
}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message GetProjectDashboardRequest {
  string project = 1;
}

message CountBucket {
  string name = 1;
  int32 count = 2;
}

message ActivityBucket {
  string date = 1;
  int32 count = 2;
}

message GetProjectDashboardResponse {
  Project project = 1;
  int32 total_insights = 2;
  repeated CountBucket category_counts = 3;
  repeated CountBucket source_counts = 4;
  repeated CountBucket top_tags = 5;
  repeated ActivityBucket recent_activity = 6;
  repeated Insight recent_insights = 7;
}

message Insight {
  string id = 1;
  string key = 2;
  string content = 3;
  repeated string tags = 4;
  string category = 5;
  string source = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  string rendered_html = 9;
  int32 revision = 10;
}

message GetInsightRequest {
  string project = 1;
  oneof selector {
    string id = 2;
    string key = 3;
  }
  optional int32 relation_limit = 4;
}

message InsightReference {
  string target_key = 1;
  bool resolved = 2;
  string id = 3;
  string key = 4;
  string category = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetInsightResponse {
  Insight insight = 1;
  repeated InsightReference links = 2;
  repeated InsightReference backlinks = 3;
  int32 link_count = 4;
  int32 backlink_count = 5;
  bool links_truncated = 6;
  bool backlinks_truncated = 7;
}

message ListInsightHistoryRequest {
  string project = 1;
  string id = 2;
  int32 limit = 3;
  string cursor = 4;
}

message InsightRevision {
  int32 revision = 1;
  string operation = 2;
  string key = 3;
  string content = 4;
  repeated string tags = 5;
  string category = 6;
  string source = 7;
  google.protobuf.Timestamp deleted_at = 8;
  string changed_by = 9;
  google.protobuf.Timestamp changed_at = 10;
  string rendered_html = 11;
}

message ListInsightHistoryResponse {
  string insight_id = 1;
  string key = 2;
  int32 current_revision = 3;
  bool deleted = 4;
  repeated InsightRevision revisions = 5;
  string next_cursor = 6;
}

message ListInsightsRequest {
  string project = 1;
  string tag = 2;
  int32 limit = 3;
  string cursor = 4;
}

message ListInsightsResponse {
  repeated Insight insights = 1;
  string next_cursor = 2;
}

message SearchInsightsRequest {
  string project = 1;
  string query = 2;
  repeated string tags = 3;
  int32 limit = 4;
  string cursor = 5;
}

message SearchInsightsResponse {
  repeated Insight insights = 1;
  string next_cursor = 2;
}

message ListTagsRequest {
  string project = 1;
  int32 limit = 2;
}

message ListTagsResponse {
  repeated CountBucket tags = 1;
}
