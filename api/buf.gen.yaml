version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/wolfeidau/starlogz/api/gen/proto/go
plugins:
  - local:
      - go
      - tool
      - protoc-gen-go
    out: gen/proto/go
    opt: paths=source_relative
  - local:
      - go
      - tool
      - protoc-gen-connect-go
    out: gen/proto/go
    opt: paths=source_relative
  - local: ../node_modules/.bin/protoc-gen-es
    opt: target=ts
    out: gen/proto/es
  - local: ../node_modules/.bin/protoc-gen-connect-query
    out: gen/proto/es
    opt: target=ts
