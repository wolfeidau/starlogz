image: "buildkite/hosted-agent-base-images:ubuntu-jammy"

cache:
  name: "build-cache"
  paths:
    - "/gocache"
    - "/gomodcache"
  size: "100g"

steps:
  - group: ":mag: QA"
    key: quality_checks
    steps:
      - label: ":golangci-lint: lint"
        commands:
          - bun install --frozen-lockfile
          - bun run build
          - golangci-lint run --output.sarif.path golangci-lint.sarif --verbose --timeout 3m
        artifact_paths:
          - golangci-lint.sarif
        env:
          GOCACHE: /gocache
          GOMODCACHE: /gomodcache
        plugins:
          - mise#v1.1.1: ~
          - ./.buildkite/plugins/sarif-annotate:
              file: golangci-lint.sarif

      - label: ":terraform: lint"
        command: tflint --chdir=infra/terraform -f sarif > tflint.sarif
        artifact_paths:
          - tflint.sarif
        env:
          TFLINT_LOG: debug
        plugins:
          - mise#v1.1.1: ~
          - ./.buildkite/plugins/sarif-annotate:
              file: tflint.sarif

      - label: ":go: test"
        artifact_paths:
          - cover-tree.svg
          - coverage.out
          - junit.xml
        commands:
          - bun install --frozen-lockfile
          - bun run build
          - go run gotest.tools/gotestsum@latest --junitfile junit.xml --format testname -- -coverprofile=coverage.out ./...
          - go run github.com/nikolaydubina/go-cover-treemap -coverprofile coverage.out > cover-tree.svg
          - echo '<details><summary>Coverage tree map</summary><img src="artifact://cover-tree.svg" alt="Test coverage tree map" width="70%"></details>' | buildkite-agent annotate --style "info"
        env:
          GOCACHE: /gocache
          GOMODCACHE: /gomodcache
        plugins:
          - mise#v1.1.1: ~

      - label: ":bun: lint"
        command:
          - bun install
          - bun run lint
        plugins:
          - mise#v1.1.1: ~
