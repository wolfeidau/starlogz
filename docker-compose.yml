services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: starlogz
      POSTGRES_USER: starlogz
      POSTGRES_PASSWORD: starlogz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starlogz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
